{{- if .Values.backup.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    {{- include "url-platform.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Fail the job if the backup doesn't complete within 30 minutes.
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: postgres-backup
          restartPolicy: OnFailure

          containers:
            - name: backup
              image: mcr.microsoft.com/azure-cli:{{ .Values.backup.azureCliTag }}
              imagePullPolicy: IfNotPresent

              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER
                - name: STORAGE_ACCOUNT
                  value: {{ .Values.backup.storageAccount | quote }}
                - name: CONTAINER
                  value: {{ .Values.backup.storageContainer | quote }}

              command:
                - /bin/bash
                - -euo
                - pipefail
                - -c
                - |
                  TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  PGHOST=postgres

                  echo "==> Starting backup at ${TIMESTAMP}"

                  backup_db() {
                    local db=$1
                    local filename="${db}_${TIMESTAMP}.sql.gz"
                    local tmpfile="/tmp/${filename}"

                    echo "--> Dumping ${db}..."
                    pg_dump -h "${PGHOST}" -U "${PGUSER}" "${db}" | gzip > "${tmpfile}"

                    echo "--> Uploading ${filename} to blob storage..."
                    az storage blob upload \
                      --auth-mode login \
                      --account-name "${STORAGE_ACCOUNT}" \
                      --container-name "${CONTAINER}" \
                      --name "${filename}" \
                      --file "${tmpfile}" \
                      --overwrite

                    rm -f "${tmpfile}"
                    echo "--> ${db} backup complete."
                  }

                  backup_db {{ .Values.postgres.urlServiceDb }}
                  backup_db {{ .Values.postgres.analyticsDb }}

                  echo "==> All backups complete."

              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
{{- end }}
