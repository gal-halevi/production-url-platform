{{- if .Values.backup.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    {{- include "url-platform.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Fail the job if the backup doesn't complete within 30 minutes.
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: postgres-backup
          restartPolicy: OnFailure

          volumes:
            - name: backup-data
              emptyDir: {}

          # Step 1: pg_dump both databases into the shared volume.
          # Uses the postgres image which has pg_dump available.
          initContainers:
            - name: dump
              image: postgres:{{ .Values.backup.postgresTag }}
              imagePullPolicy: IfNotPresent

              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER

              volumeMounts:
                - name: backup-data
                  mountPath: /backup

              command:
                - /bin/bash
                - -euo
                - pipefail
                - -c
                - |
                  TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  PGHOST=postgres

                  echo "==> Starting dump at ${TIMESTAMP}"

                  dump_db() {
                    local db=$1
                    local filename="${db}_${TIMESTAMP}.sql.gz"

                    echo "--> Dumping ${db}..."
                    pg_dump -h "${PGHOST}" -U "${PGUSER}" "${db}" | gzip > "/backup/${filename}"
                    echo "--> ${db} dump complete: ${filename}"
                  }

                  dump_db url_platform_urls
                  dump_db url_platform_analytics

                  echo "==> All dumps complete."

              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

          # Step 2: upload the dump files to Azure Blob Storage.
          # Uses the azure-cli image which has az available.
          containers:
            - name: upload
              image: mcr.microsoft.com/azure-cli:{{ .Values.backup.azureCliTag }}
              imagePullPolicy: IfNotPresent

              env:
                - name: STORAGE_ACCOUNT
                  value: {{ .Values.backup.storageAccount | quote }}
                - name: CONTAINER
                  value: {{ .Values.backup.storageContainer | quote }}

              volumeMounts:
                - name: backup-data
                  mountPath: /backup

              command:
                - /bin/bash
                - -euo
                - pipefail
                - -c
                - |
                  # Explicitly log in using the Workload Identity federated token.
                  # az CLI does not automatically pick up the injected environment
                  # variables — an explicit login is required.
                  az login \
                    --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                    --service-principal \
                    --username "$AZURE_CLIENT_ID" \
                    --tenant "$AZURE_TENANT_ID" \
                    --output none

                  echo "==> Uploading backups to blob storage..."

                  for file in /backup/*.sql.gz; do
                    filename=$(basename "${file}")
                    echo "--> Uploading ${filename}..."
                    az storage blob upload \
                      --auth-mode login \
                      --account-name "${STORAGE_ACCOUNT}" \
                      --container-name "${CONTAINER}" \
                      --name "${filename}" \
                      --file "${file}" \
                      --overwrite
                    echo "--> ${filename} uploaded."
                  done

                  echo "==> All uploads complete."

              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
{{- end }}
