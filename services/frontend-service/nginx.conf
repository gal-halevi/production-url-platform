server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Proxy API calls to backend services — avoids browser CORS in local dev.
    # Use prefix /api/ so these never conflict with React Router paths (/stats, /shorten).
    # In production, API_URL is set to the full external URL so the browser bypasses this proxy.
    location /api/urls {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass         http://url-service:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/stats {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass         http://analytics-service:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Health endpoint — static JSON file written by docker-entrypoint.sh at startup.
    # Contains version/commit/env injected at runtime so the smoke test can verify
    # the correct image is deployed, consistent with other platform services.
    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store";
        try_files /health.json =404;
    }

    # SPA routing — all paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite content-hashes filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache for index.html (must always re-check for new deploys)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Kubernetes liveness/readiness probe
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}
