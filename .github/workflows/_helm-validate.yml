name: _helm-validate

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Check migration SQL files are in sync
        run: |
          diff \
            services/analytics-service/migrations/V1__create_analytics_table.sql \
            charts/url-platform/migrations/analytics/V1__create_analytics_table.sql
          diff \
            services/url-service/migrations/V1__create_urls_table.sql \
            charts/url-platform/migrations/url-service/V1__create_urls_table.sql
          diff \
            scripts/postgres/init-databases.sql \
            charts/url-platform/migrations/postgres/init-databases.sql
      - name: Lint chart
        run: helm lint charts/url-platform

      - name: Validate rendered manifests (kubeconform)
        # Render the chart with default values and validate all manifests against
        # the Kubernetes 1.31 schema — matching the AKS regional default.
        # --ignore-missing-schemas allows CRDs (PrometheusRule, ServiceMonitor,
        # ExternalSecret etc.) to pass through without errors since their schemas
        # are not in the upstream Kubernetes schema registry.
        # Uses the official kubeconform Docker container as recommended in the
        # kubeconform README — helm template pipes to kubeconform via stdin.
        run: |
          helm template charts/url-platform | docker run --rm -i \
            ghcr.io/yannh/kubeconform:v0.6.7 \
            -strict \
            -kubernetes-version 1.31.0 \
            -ignore-missing-schemas \
            -summary \
            -
