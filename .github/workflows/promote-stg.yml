name: promote-stg

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Promote from (dev recommended)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev

permissions:
  contents: write

concurrency:
  group: promote-stg
  cancel-in-progress: false

jobs:
  promote:
    uses: ./.github/workflows/_promote-env.yml
    with:
      source_env: ${{ inputs.source_env }}
      target_env: stg
    secrets:
      gitops_token: ${{ secrets.GITOPS_TOKEN }}
